# Codecov configuration
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  precision: 2
  round: down
  range: "50...100"
  status:
    project:
      default:
        target: 50%
        threshold: 5%

# Ignore paths from coverage calculation
# Platform-specific code requires native OS features (systray, D-Bus, ObjC)
ignore:
  - "examples/"
  - "internal/platform_windows.go"
  - "internal/platform_darwin.go"
  - "internal/platform_linux.go"
  - "internal/darwin/"
  - "tmp/"

parsers:
  go:
    partials_as_hits: false

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false
